body:
  text: 爾時天尊在禪黎國土與大道眞仙萬萬億千人諸天尊及諸天龍鬼神盡來集會受吾約束世間若有善男子善女人忽有年災月厄遊城赤鼠之厄天羅地網之厄命窮算盡之厄疾病纒綿之厄落水波濤之厄虎狼蚖蛇之厄水火盗賊刀兵生產之厄山林樹木社稷之厄土石橋梁之厄毒藥咒詛之厄唯願今對玉皇天尊大道眞聖懴悔解禳度脫身中災厄一一解散勿爲留難勅諸天神王並降聖力道力承此經力恩力衞護弟子受持念誦此經已後解陽九百六之災三衰九橫八難五苦之厄所求如願所履平安出入行藏常䝉吉慶所爲利益所欲隨心於是眾等聞說此經皆大歡喜信受奉行
