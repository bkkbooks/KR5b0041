front:
  text: 四經同卷乃六
  hash: sha256:0e45f7e9eeb2310903c854e697e29d79a4d4ab9cb5766f3ac616f458caf87eb9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0041_HFL_000-001a, image: hfl/0179/0179-120.png}
body:
  text: 太上靈寶天尊說禳災度厄經太上神呪延壽妙經太上洞玄靈寶消禳火災經太上洞玄靈寶天尊說養𧖟營種經太上靈寶天尊說禳災度厄經爾時天尊在襌黎國土與大道真仙萬萬億千人諸天尊及諸天龍鬼神盡來集㑹受吾約束世間若有善男子善女人忽有年災月厄遊城赤鼠之厄天羅地網之厄命窮算盡之厄疾病纏綿之厄落水波濤之厄虎狼蚖蛇之厄水火盜賊刀兵生産之厄山林樹木社稷之厄土石橋梁之厄毒藥呪詛之厄唯願今對玉皇天尊大道真聖懴悔解禳度脫身中災厄一一解散勿為留難勑諸天神王並降聖力道力承此經力恩力衛護弟子受持念誦此經巳後解陽九百六之災三衰九橫八難五苦之厄所求如願所履平安出入行藏常蒙吉慶所為利益所欲隨心於是衆等聞說此經皆大歡喜信受奉行太上靈寶天尊說禳災度厄經
  hash: sha256:c91dee3227f576934ecce88c829d4d65939755ed559bcc54269a8587befc4619
